experiment_name: walker_walk_to_run_a100_r2_vision25m

r2dreamer:
  repo_env_var: R2DREAMER_REPO
  remote: https://github.com/NM512/r2dreamer.git
  commit: 546e4fab8146ea4b14e1d7726bbc1a8a1d50322f  # pinned; see external_revisions.lock (r2dreamer)
  extras: dmc

paths:
  log_root_env_var: R2_LOG_ROOT
  figure_dir_env_var: R2_FIGURE_DIR

algorithm:
  rep_loss: r2dreamer
  model: size25M

build_scale:
  tier: a100_vision_balanced
  intended_gpu: A100
  notes: "Balanced image-observation R2-Dreamer run. Keeps the size25M model and run names while reducing the original vision compute budget."

environment:
  env: dmc_vision
  source_task: dmc_walker_walk
  target_task: dmc_walker_run
  disable_image_render: false
  serial_envs: false

training:
  seed: 0
  source_steps: 800000
  target_steps: 400000
  batch_size: 16
  batch_length: 64
  train_ratio: 224
  env_num: 8
  eval_every: 50000
  eval_episodes: 5
  save_eval_checkpoints: true
  checkpoint_keep: 6
  progress_every: 100

finetuning:
  pretrained_strict: true
  load_optimizer: false

rendering:
  mujoco_gl: osmesa
  mujoco_egl_device_id: 0

smoke:
  steps: 2000
  batch_size: 4
  batch_length: 16
  train_ratio: 4
  env_num: 1
  eval_every: 1000
  eval_episodes: 0
  checkpoint_every: 0
  checkpoint_keep: 1
  progress_every: 100
  compile: false
