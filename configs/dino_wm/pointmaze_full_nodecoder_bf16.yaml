extends: pointmaze_scratch_a100.yaml
run_name: pointmaze_full_nodecoder_bf16_a100_b32_seed0

training:
  batch_size: 32
  epochs: 10
  num_workers: 4
  # Checkpoint cadence: full epoch checkpoints every epoch, plus a rolling
  # intra-epoch state_dict checkpoint every N optimizer steps (~3-4 min on
  # A100) so a disconnect costs at most that many steps. The step checkpoint
  # needs DINO_PATCH_STEP_CHECKPOINTING=1 (the notebook preflight sets it).
  save_every_epochs: 1
  save_every_steps: 2000
  max_wall_minutes: 220

# Training-time planning stays off; the notebook's standalone planning cell
# evaluates the checkpoint with these planner settings.
planning:
  enabled: false
  n_evals: 200

# Latent-cache training: run_experiment.sh precomputes frozen DINO patch
# latents once, then training reads 4-frame latent slices instead of
# reloading and re-encoding full episode image files per sample. Explicit
# here because the decoder-enabled parent config disables the cache.
features:
  cache_enabled: true

upstream:
  train_overrides:
    - has_decoder=false
    - model.train_decoder=false
    - ++training.num_reconstruct_samples=0

metadata:
  notes: "A100-oriented full-data no-decoder PointMaze run on cached DINO latents; launch with DINO_MIXED_PRECISION=bf16."
  tags:
    - pointmaze
    - full-data
    - nodecoder
    - bf16
    - latent-cache
    - a100
